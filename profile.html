<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wishlist – Giftaan</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="navbar-brand">Gift<span>aan</span></a>
    <div class="navbar-search" style="position:relative;">
      <span class="search-icon">🔍</span>
      <input type="text" id="navSearchInput" placeholder="Search wishlists…" autocomplete="off"/>
      <div class="search-results hidden" id="navSearchResults"></div>
    </div>
    <div class="navbar-actions" id="navActions"></div>
  </div>
</nav>

<div id="profileHero"></div>

<div class="profile-content" id="profileContent">
  <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">Loading…</div>
</div>

<!-- Connection Request Modal -->
<div class="modal-overlay" id="connReqModal">
  <div class="modal" style="max-width:380px;">
    <div class="modal-header">
      <div class="modal-title">Send Connection Request</div>
      <button class="modal-close" id="closeConnModal">✕</button>
    </div>
    <p style="color:var(--text-muted);margin-bottom:24px;" id="connReqText"></p>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary btn-full" id="confirmConnBtn">Send Request</button>
      <button class="btn btn-ghost" id="cancelConnBtn">Cancel</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { toast, getUserByUsername, getUser, renderNav, initSearch, formatPrice } from './js/utils.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  collection, getDocs, query, orderBy, doc, getDoc,
  setDoc, serverTimestamp, deleteDoc, updateDoc, increment
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const params = new URLSearchParams(location.search);
const username = params.get('u');
if (!username) { window.location.href = 'index.html'; }

let viewerUser = null;
let profileUser = null;
let isOwner = false;
let connectionStatus = null;
let allProducts = [];

onAuthStateChanged(auth, async viewer => {
  viewerUser = viewer;
  await renderNav(viewer);
  initSearch('navSearchInput', 'navSearchResults');
  await loadProfile();
});

// ── Load Profile ─────────────────────────────────────────────
async function loadProfile() {
  try {
    profileUser = await getUserByUsername(username);
  } catch(e) {
    console.error('Error loading profile:', e);
    showError('Could not load profile. Please try again.');
    return;
  }

  if (!profileUser) {
    // User not found by username — show helpful message
    showError(`No user found with username "@${username}". They may not have completed their profile setup yet.`);
    return;
  }

  document.title = `${profileUser.displayName}'s Wishlist – Giftaan`;
  isOwner = viewerUser && viewerUser.uid === profileUser.uid;

  if (viewerUser && !isOwner) {
    connectionStatus = await getConnectionStatus(viewerUser.uid, profileUser.uid);
  }

  // Private account guard
  if (profileUser.isPrivate && !isOwner && connectionStatus !== 'connected') {
    renderPrivateBlock();
    return;
  }

  renderHero();
  await loadProducts();
}

function showError(message) {
  document.getElementById('profileContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">😕</div>
      <h3>Profile not found</h3>
      <p>${message}</p>
      <a href="dashboard.html" class="btn btn-primary btn-sm" style="margin-top:16px;">Go to Dashboard</a>
    </div>`;
}

// ── Connection Status ─────────────────────────────────────────
async function getConnectionStatus(viewerUid, profileUid) {
  try {
    const sentSnap = await getDoc(doc(db, 'users', profileUid, 'connectionRequests', viewerUid));
    if (sentSnap.exists()) return sentSnap.data().status === 'accepted' ? 'connected' : 'pending_sent';
    const receivedSnap = await getDoc(doc(db, 'users', viewerUid, 'connectionRequests', profileUid));
    if (receivedSnap.exists()) return receivedSnap.data().status === 'accepted' ? 'connected' : 'pending_received';
  } catch(e) { console.error('Connection status error:', e); }
  return null;
}

// ── Render Hero ───────────────────────────────────────────────
function renderHero() {
  const avatarHtml = profileUser.avatarEmoji
    ? `<span style="font-size:50px">${profileUser.avatarEmoji}</span>`
    : (profileUser.displayName || 'U')[0].toUpperCase();

  document.getElementById('profileHero').innerHTML = `
    <div class="profile-hero">
      <div class="profile-info-row">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">${avatarHtml}</div>
        </div>
        <div class="profile-meta">
          <div class="profile-name">${profileUser.displayName}</div>
          <div class="profile-username">@${profileUser.username} · ${profileUser.connectionCount || 0} connections
            ${profileUser.isPrivate ? '· <span class="tag tag-red">🔒 Private</span>' : ''}
          </div>
          ${profileUser.about ? `<div class="profile-about">${profileUser.about}</div>` : ''}
        </div>
        <div class="profile-actions-row" id="heroActions"></div>
      </div>
      <div class="profile-tabs">
        <div class="profile-tab active" id="tabWishlist">Wishlist</div>
      </div>
    </div>`;

  const actions = document.getElementById('heroActions');
  if (isOwner) {
    actions.innerHTML = `
      <a href="profile-edit.html" class="btn btn-secondary btn-sm">✏️ Edit Profile</a>
      <button class="btn btn-ghost btn-sm" id="shareLinkBtn" style="color:var(--gold);border-color:var(--gold)">🔗 Share Link</button>`;
    document.getElementById('shareLinkBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(location.href).then(() => toast('Profile link copied!', 'success'));
    });
  } else {
    renderConnectionBtn(actions);
  }
}

function renderPrivateBlock() {
  const avatarHtml = profileUser.avatarEmoji
    ? `<span style="font-size:50px">${profileUser.avatarEmoji}</span>`
    : (profileUser.displayName || 'U')[0].toUpperCase();

  document.getElementById('profileHero').innerHTML = `
    <div class="profile-hero">
      <div class="profile-info-row">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">${avatarHtml}</div>
        </div>
        <div class="profile-meta">
          <div class="profile-name">${profileUser.displayName}</div>
          <div class="profile-username">@${profileUser.username} · <span class="tag tag-red">🔒 Private</span></div>
          ${profileUser.about ? `<div class="profile-about">${profileUser.about}</div>` : ''}
        </div>
        <div class="profile-actions-row" id="heroActions"></div>
      </div>
    </div>`;

  document.getElementById('profileContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔒</div>
      <h3>This account is private</h3>
      <p>Connect with ${profileUser.displayName} to see their wishlist.</p>
      <div id="connBtnWrap" style="margin-top:16px;"></div>
    </div>`;

  renderConnectionBtn(document.getElementById('heroActions'));
  renderConnectionBtn(document.getElementById('connBtnWrap'));
}

// ── Connection Button ─────────────────────────────────────────
function renderConnectionBtn(container) {
  if (!container) return;
  if (!viewerUser) {
    container.innerHTML = `<a href="auth.html" class="btn btn-primary btn-sm">Sign in to connect</a>`;
    return;
  }
  if (connectionStatus === 'connected') {
    container.innerHTML = `<button class="btn btn-ghost btn-sm" id="disconnectBtn" style="color:var(--crimson);border-color:var(--crimson);">✓ Connected · Remove</button>`;
    document.getElementById('disconnectBtn')?.addEventListener('click', async () => {
      try {
        await deleteDoc(doc(db, 'users', profileUser.uid, 'connectionRequests', viewerUser.uid));
        await deleteDoc(doc(db, 'users', viewerUser.uid, 'connectionRequests', profileUser.uid));
        await updateDoc(doc(db, 'users', viewerUser.uid), { connectionCount: increment(-1) });
        await updateDoc(doc(db, 'users', profileUser.uid), { connectionCount: increment(-1) });
        toast('Connection removed', 'info');
        location.reload();
      } catch(e) { toast('Error: ' + e.message, 'error'); }
    });
  } else if (connectionStatus === 'pending_sent') {
    container.innerHTML = `<button class="btn btn-ghost btn-sm" disabled>⏳ Request Sent</button>`;
  } else if (connectionStatus === 'pending_received') {
    container.innerHTML = `
      <button class="btn btn-primary btn-sm" id="acceptConnBtn">✓ Accept Request</button>
      <button class="btn btn-ghost btn-sm" id="declineConnBtn">✗ Decline</button>`;
    document.getElementById('acceptConnBtn')?.addEventListener('click', async () => {
      try {
        await setDoc(doc(db, 'users', viewerUser.uid, 'connectionRequests', profileUser.uid), { status: 'accepted', updatedAt: serverTimestamp() }, { merge: true });
        await setDoc(doc(db, 'users', profileUser.uid, 'connectionRequests', viewerUser.uid), { status: 'accepted', updatedAt: serverTimestamp() }, { merge: true });
        await updateDoc(doc(db, 'users', viewerUser.uid), { connectionCount: increment(1) });
        await updateDoc(doc(db, 'users', profileUser.uid), { connectionCount: increment(1) });
        toast('Connected!', 'success');
        location.reload();
      } catch(e) { toast('Error: ' + e.message, 'error'); }
    });
    document.getElementById('declineConnBtn')?.addEventListener('click', async () => {
      try {
        await deleteDoc(doc(db, 'users', viewerUser.uid, 'connectionRequests', profileUser.uid));
        toast('Request declined', 'info');
        location.reload();
      } catch(e) { toast('Error: ' + e.message, 'error'); }
    });
  } else {
    container.innerHTML = `<button class="btn btn-primary btn-sm" id="connectBtn">+ Connect</button>`;
    document.getElementById('connectBtn')?.addEventListener('click', () => {
      document.getElementById('connReqText').textContent = `Send a connection request to ${profileUser.displayName}?`;
      document.getElementById('connReqModal').classList.add('open');
    });
  }
}

// Connection modal buttons
document.getElementById('closeConnModal').addEventListener('click', () => document.getElementById('connReqModal').classList.remove('open'));
document.getElementById('cancelConnBtn').addEventListener('click', () => document.getElementById('connReqModal').classList.remove('open'));
document.getElementById('confirmConnBtn').addEventListener('click', async () => {
  try {
    await setDoc(doc(db, 'users', profileUser.uid, 'connectionRequests', viewerUser.uid), {
      status: 'pending', from: viewerUser.uid, createdAt: serverTimestamp()
    });
    toast('Connection request sent!', 'success');
    document.getElementById('connReqModal').classList.remove('open');
    connectionStatus = 'pending_sent';
    renderHero();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
});

// ── Load Products ─────────────────────────────────────────────
async function loadProducts() {
  try {
    const snap = await getDocs(query(
      collection(db, 'wishlists', profileUser.uid, 'products'),
      orderBy('addedAt', 'desc')
    ));
    allProducts = [];
    snap.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
  } catch(e) {
    console.error('Error loading products:', e);
    allProducts = [];
  }

  // Clear the loading state
  document.getElementById('profileContent').innerHTML = '';

  // Address block first
  renderAddress();

  if (!allProducts.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="empty-icon">🎁</div><h3>Nothing here yet</h3><p>${profileUser.displayName} hasn't added any products to their wishlist yet.</p>`;
    document.getElementById('profileContent').appendChild(empty);
    return;
  }

  renderFilters();
  renderProductList(allProducts);
}

// ── Address ───────────────────────────────────────────────────
function renderAddress() {
  if (!profileUser.address) return;
  const av = profileUser.addressVisibility || 'connections';
  let showAddress = false;
  if (isOwner) showAddress = true;
  else if (av === 'all' && viewerUser) showAddress = true;
  else if (av === 'connections' && connectionStatus === 'connected') showAddress = true;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:28px;';
  wrap.innerHTML = `
    <div style="font-weight:700;font-size:16px;margin-bottom:12px;">📍 Delivery Address</div>
    <div class="${showAddress ? '' : 'address-masked'}">
      ${showAddress
        ? profileUser.address.replace(/\n/g, '<br>')
        : '••••••••••••••••••••••••'}
    </div>
    ${!showAddress ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
      ${viewerUser ? 'Connect to see the delivery address' : 'Sign in and connect to see the delivery address'}
    </div>` : ''}`;
  document.getElementById('profileContent').appendChild(wrap);
}

// ── Filters ───────────────────────────────────────────────────
function renderFilters() {
  const cats = [...new Set(allProducts.map(p => p.category))];
  const wrap = document.createElement('div');
  wrap.className = 'filter-bar';
  wrap.innerHTML = `
    <div>
      <label>Category</label>
      <div class="filter-chips" id="catChips">
        <div class="chip active" data-cat="all">All</div>
        ${cats.map(c => `<div class="chip" data-cat="${c}">${c}</div>`).join('')}
      </div>
    </div>
    <div class="price-range">
      <label>Price</label>
      <span style="font-size:12px;color:var(--text-muted)">₹</span>
      <input type="number" id="minPrice" placeholder="Min" min="0"/>
      <span style="font-size:12px;color:var(--text-muted)">–</span>
      <input type="number" id="maxPrice" placeholder="Max" min="0"/>
      <button class="btn btn-ghost btn-sm" id="applyFilter">Apply</button>
      <button class="btn btn-ghost btn-sm" id="clearFilter">Clear</button>
    </div>
    <div style="margin-left:auto;">
      <label>Sort</label>
      <select class="form-control" id="sortSelect" style="padding:6px 10px;font-size:12px;">
        <option value="added_desc">Recently Added</option>
        <option value="price_asc">Price: Low to High</option>
        <option value="price_desc">Price: High to Low</option>
      </select>
    </div>`;
  document.getElementById('profileContent').appendChild(wrap);

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      applyFilters();
    });
  });
  document.getElementById('applyFilter').addEventListener('click', applyFilters);
  document.getElementById('clearFilter').addEventListener('click', () => {
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.querySelector('.chip[data-cat="all"]').classList.add('active');
    applyFilters();
  });
  document.getElementById('sortSelect').addEventListener('change', applyFilters);
}

function applyFilters() {
  const activeCat = document.querySelector('.chip.active')?.dataset.cat || 'all';
  const minP = parseFloat(document.getElementById('minPrice')?.value) || 0;
  const maxP = parseFloat(document.getElementById('maxPrice')?.value) || Infinity;
  const sort = document.getElementById('sortSelect')?.value || 'added_desc';
  let list = allProducts.filter(p => {
    if (activeCat !== 'all' && p.category !== activeCat) return false;
    if (p.price < minP || p.price > maxP) return false;
    return true;
  });
  if (sort === 'price_asc') list.sort((a, b) => a.price - b.price);
  else if (sort === 'price_desc') list.sort((a, b) => b.price - a.price);
  renderProductList(list);
}

// ── Product List ──────────────────────────────────────────────
function renderProductList(list) {
  let wrap = document.getElementById('productListWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'productListWrap';
    document.getElementById('profileContent').appendChild(wrap);
  }
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>No products match your filters</h3></div>`;
    return;
  }
  const byCat = {};
  list.forEach(p => { if (!byCat[p.category]) byCat[p.category] = []; byCat[p.category].push(p); });
  wrap.innerHTML = Object.entries(byCat).map(([cat, items]) => `
    <div class="category-section">
      <div class="category-title">${cat} <span style="font-size:14px;font-weight:400;color:var(--text-muted)">(${items.length})</span></div>
      <div class="product-grid">
        ${items.map(p => `
          <div class="product-card">
            ${p.imageUrl
              ? `<img src="${p.imageUrl}" class="product-img" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                 <div class="product-img-placeholder" style="display:none">🎁</div>`
              : `<div class="product-img-placeholder">🎁</div>`}
            <div class="product-body">
              <div class="product-category">${p.category}</div>
              <div class="product-name">${p.name}</div>
              ${p.note ? `<div style="font-size:12px;color:var(--text-muted)">${p.note}</div>` : ''}
              <div class="product-price">${formatPrice(p.price)}</div>
            </div>
            <div class="product-actions">
              <a href="${p.affiliateUrl}" target="_blank" rel="noopener" class="btn btn-dark btn-sm" style="flex:1;justify-content:center;">Gift This 🎁</a>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
</script>
</body>
</html>
