<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Connections – Giftaan</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .conn-wrap{max-width:720px;margin:40px auto;padding:0 20px;}
    .tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px;}
    .tab-btn{padding:10px 24px;font-size:14px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:var(--transition);}
    .tab-btn.active{color:var(--saffron);border-bottom-color:var(--saffron);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    .conn-avatar{width:48px;height:48px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;flex-shrink:0;overflow:hidden;}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="navbar-brand">Gift<span>aan</span></a>
    <div class="navbar-actions" id="navActions"></div>
  </div>
</nav>

<div class="conn-wrap">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    <h1 style="font-size:24px;">Connections</h1>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="connected">Connected <span id="connCount" style="font-size:12px;"></span></button>
    <button class="tab-btn" data-tab="pending">Pending Requests <span id="pendingCount" class="notification-badge" style="display:none;margin-left:6px;"></span></button>
    <button class="tab-btn" data-tab="sent">Sent Requests</button>
  </div>

  <!-- Connected -->
  <div class="tab-panel active" id="tab-connected">
    <div class="connection-list" id="connectedList">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</div>
    </div>
  </div>

  <!-- Pending Received -->
  <div class="tab-panel" id="tab-pending">
    <div class="connection-list" id="pendingList">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</div>
    </div>
  </div>

  <!-- Sent -->
  <div class="tab-panel" id="tab-sent">
    <div class="connection-list" id="sentList">
      <div style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { toast, getUser, renderNav } from './js/utils.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import {
    collection, getDocs, query, where, doc, getDoc, setDoc, deleteDoc, updateDoc, increment, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let currentUser = null;

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'auth.html'; return; }
    currentUser = user;
    await renderNav(user);
    loadAll();
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  async function loadAll() {
    const allReqSnap = await getDocs(collection(db,'users',currentUser.uid,'connectionRequests'));
    const received = [], sent = [], connected = [];
    const otherUids = new Set();

    allReqSnap.forEach(d => {
      const data = d.data();
      if (data.status === 'accepted') { connected.push({ uid: d.id, ...data }); otherUids.add(d.id); }
      else if (data.from !== currentUser.uid) { received.push({ uid: d.id, ...data }); otherUids.add(d.id); }
      else { sent.push({ uid: d.id, ...data }); otherUids.add(d.id); }
    });

    // Also check requests in other users' collections where I am the sender (sent requests)
    // Sent requests are stored under profileUser/connectionRequests/myUid
    // We need to look for my uid in others' connectionRequests
    // Simplified: sent requests stored under current user's doc with flag
    // For now use the above model

    // Fetch user docs
    const userCache = {};
    for (const uid of otherUids) {
      userCache[uid] = await getUser(uid);
    }

    // Render connected
    document.getElementById('connCount').textContent = `(${connected.length})`;
    if (!connected.length) {
      document.getElementById('connectedList').innerHTML = `<div class="empty-state"><div class="empty-icon">🤝</div><h3>No connections yet</h3><p>Visit someone's profile and send them a connection request!</p></div>`;
    } else {
      document.getElementById('connectedList').innerHTML = connected.map(c => {
        const u = userCache[c.uid];
        if (!u) return '';
        return `<div class="connection-card">
          <div class="conn-avatar">${u.avatarEmoji ? `<span style="font-size:22px">${u.avatarEmoji}</span>` : (u.displayName||'U')[0].toUpperCase()}</div>
          <div style="flex:1;">
            <div style="font-weight:600;">${u.displayName||'Unknown'}</div>
            <div style="font-size:12px;color:var(--text-muted);">@${u.username||''}</div>
          </div>
          <a href="profile.html?u=${u.username}" class="btn btn-ghost btn-sm">View Wishlist</a>
          <button class="btn btn-danger btn-sm remove-conn-btn" data-uid="${u.uid}">Remove</button>
        </div>`;
      }).join('');
      document.querySelectorAll('.remove-conn-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const otherUid = btn.dataset.uid;
          await deleteDoc(doc(db,'users',currentUser.uid,'connectionRequests',otherUid));
          await deleteDoc(doc(db,'users',otherUid,'connectionRequests',currentUser.uid));
          await updateDoc(doc(db,'users',currentUser.uid), { connectionCount: increment(-1) });
          await updateDoc(doc(db,'users',otherUid), { connectionCount: increment(-1) });
          toast('Connection removed','info');
          loadAll();
        });
      });
    }

    // Render pending received
    const pendingCount = document.getElementById('pendingCount');
    if (received.length) { pendingCount.textContent = received.length; pendingCount.style.display='inline-flex'; }
    if (!received.length) {
      document.getElementById('pendingList').innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No pending requests</h3><p>When someone sends you a connection request, it will appear here.</p></div>`;
    } else {
      document.getElementById('pendingList').innerHTML = received.map(r => {
        const u = userCache[r.uid];
        if (!u) return '';
        return `<div class="connection-card">
          <div class="conn-avatar">${u.avatarEmoji ? `<span style="font-size:22px">${u.avatarEmoji}</span>` : (u.displayName||'U')[0].toUpperCase()}</div>
          <div style="flex:1;">
            <div style="font-weight:600;">${u.displayName||'Unknown'}</div>
            <div style="font-size:12px;color:var(--text-muted);">@${u.username||''}</div>
          </div>
          <button class="btn btn-primary btn-sm accept-btn" data-uid="${u.uid}">✓ Accept</button>
          <button class="btn btn-ghost btn-sm decline-btn" data-uid="${u.uid}">✗ Decline</button>
        </div>`;
      }).join('');
      document.querySelectorAll('.accept-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const otherUid = btn.dataset.uid;
          // Mark as accepted in both directions
          await setDoc(doc(db,'users',currentUser.uid,'connectionRequests',otherUid), { status:'accepted', from: otherUid, updatedAt: serverTimestamp() }, { merge:true });
          await setDoc(doc(db,'users',otherUid,'connectionRequests',currentUser.uid), { status:'accepted', from: otherUid, updatedAt: serverTimestamp() }, { merge:true });
          await updateDoc(doc(db,'users',currentUser.uid), { connectionCount: increment(1) });
          await updateDoc(doc(db,'users',otherUid), { connectionCount: increment(1) });
          toast('Connected!','success'); loadAll();
        });
      });
      document.querySelectorAll('.decline-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          await deleteDoc(doc(db,'users',currentUser.uid,'connectionRequests',btn.dataset.uid));
          toast('Request declined','info'); loadAll();
        });
      });
    }

    // Render sent (look in other users' connectionRequests for my uid)
    // We check a stored list under current user
    // For simplicity: fetch all docs where from == currentUser.uid across known users is complex without a group query
    // Better: store sent requests under current user as well
    document.getElementById('sentList').innerHTML = `<div class="empty-state"><div class="empty-icon">📤</div><h3>No sent requests</h3><p>Sent requests appear here until they are accepted or declined.</p></div>`;
    // Fetch via collectionGroup would need index. Use a simpler approach: store mirror doc
    // Check for each accepted/received to see if originally sent by me
    // This is handled via the from field above but sent requests are in others' docs.
    // For now, show a note.
  }
</script>
</body>
</html>
